<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>介護タクシー予約</title>
    <meta name="description" content="介護タクシー予約システム 7日固定カレンダー" />
    <style>
      :root {
        --bg: #f6f7fb;
        --card: #ffffff;
        --text: #1f2430;
        --muted: #667085;
        --line: #e4e7ec;
        --primary: #ea4c89;
        --primary-soft: #fff0f6;
        --reserved: #d0d5dd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .app {
        max-width: 460px;
        margin: 0 auto;
        min-height: 100dvh;
        background: var(--bg);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 5;
        background: var(--card);
        border-bottom: 1px solid var(--line);
        padding: 12px 16px;
      }

      .topbar h1 {
        margin: 0;
        font-size: 18px;
      }

      .topbar p {
        margin: 4px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .date-tabs {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(68px, 1fr);
        gap: 8px;
        overflow-x: auto;
        padding: 12px 12px 8px;
        scrollbar-width: thin;
      }

      .date-tab {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: #fff;
        text-align: center;
        padding: 8px 4px;
        font-size: 12px;
        line-height: 1.2;
        color: var(--text);
        white-space: nowrap;
      }

      .date-tab[aria-current="date"] {
        border-color: var(--primary);
        background: var(--primary-soft);
        font-weight: 700;
      }

      main {
        padding: 8px 12px 24px;
      }

      .panel {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 12px;
      }

      .panel h2 {
        margin: 0 0 6px;
        font-size: 16px;
      }

      .panel p {
        margin: 0 0 12px;
        font-size: 12px;
        color: var(--muted);
      }

      .slots {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }

      .slot {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 6px;
        background: #fff;
        min-height: 44px;
        font-size: 14px;
        font-weight: 600;
      }

      .slot small {
        display: block;
        font-size: 11px;
        font-weight: 500;
        color: var(--muted);
      }

      .slot.is-open {
        border-color: #fbcfe8;
        background: #fff;
      }

      .slot.is-reserved {
        background: #f2f4f7;
        border-color: var(--reserved);
        color: #98a2b3;
      }

      .legend {
        display: flex;
        gap: 12px;
        padding: 8px 2px 0;
        font-size: 12px;
        color: var(--muted);
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        display: inline-block;
        margin-right: 4px;
      }

      .dot-open {
        background: #fda4cf;
      }

      .dot-reserved {
        background: #d0d5dd;
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <h1>介護タクシー予約</h1>
        <p>ホットペッパービューティー風 / 7日固定カレンダー（HTMLのみ）</p>
      </header>

      <nav class="date-tabs" aria-label="7日選択タブ">
        <button class="date-tab" type="button" aria-current="date">4/10<br />金</button>
        <button class="date-tab" type="button">4/11<br />土</button>
        <button class="date-tab" type="button">4/12<br />日</button>
        <button class="date-tab" type="button">4/13<br />月</button>
        <button class="date-tab" type="button">4/14<br />火</button>
        <button class="date-tab" type="button">4/15<br />水</button>
        <button class="date-tab" type="button">4/16<br />木</button>
      </nav>

      <main>
        <section class="panel" aria-labelledby="slots-title">
          <h2 id="slots-title">4/10(金) の予約枠</h2>
          <p>時間をタップして予約（次ステップでフォームとJSON保存を実装）</p>

          <div class="slots" role="list" aria-label="予約時間スロット（9:00〜18:00）">
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="09:00">09:00<small>◎ 空き</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="10:00">10:00<small>◎ 空き</small></button>
            <button class="slot is-reserved" type="button" role="listitem" data-date="2026-04-10" data-time="11:00">11:00<small>× 予約済み</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="12:00">12:00<small>◎ 空き</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="13:00">13:00<small>◎ 空き</small></button>
            <button class="slot is-reserved" type="button" role="listitem" data-date="2026-04-10" data-time="14:00">14:00<small>× 予約済み</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="15:00">15:00<small>◎ 空き</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="16:00">16:00<small>◎ 空き</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="17:00">17:00<small>◎ 空き</small></button>
            <button class="slot is-open" type="button" role="listitem" data-date="2026-04-10" data-time="18:00">18:00<small>◎ 空き</small></button>
          </div>

          <div class="legend" aria-label="凡例">
            <span><i class="dot dot-open"></i>空き（◎）</span>
            <span><i class="dot dot-reserved"></i>予約済み（×）</span>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
