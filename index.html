<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>介護タクシー予約 | 公開画面</title>
    <meta name="description" content="介護タクシー予約システム（公開画面）" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="public">
    <div class="app-shell">
      <header class="topbar">
        <h1>介護タクシー予約</h1>
        <p id="ruleSummary">読み込み中...</p>
      </header>

      <main class="page-grid">
        <section class="card">
          <h2>予約カレンダー（7日）</h2>
          <p class="muted">◎：予約可 / ×：予約不可（予約済み・ブロック・締切）</p>
          <div id="weekHeader" class="date-tabs"></div>
          <div id="calendarGrid" class="calendar-grid"></div>
        </section>

        <section class="card">
          <h2>本日の予約状況</h2>
          <div id="todayList" class="list"></div>
        </section>

        <section class="card">
          <h2>予約完了履歴（直近）</h2>
          <div id="recentList" class="list"></div>
        </section>
      </main>
    </div>

    <dialog id="bookingModal" class="modal">
      <form id="bookingForm" method="dialog">
        <h3>予約内容入力</h3>
        <p id="selectedSlot" class="muted"></p>

        <label>お名前<input name="name" required maxlength="40" /></label>
        <label>電話番号<input name="phone" required inputmode="tel" placeholder="09012345678" /></label>

        <label>移動方法
          <select name="mobility" id="mobility"></select>
        </label>

        <label>メニュー
          <select name="menu" id="menu"></select>
        </label>

        <label>ストレッチャー
          <select name="stretcher" id="stretcher">
            <option value="no">なし</option>
            <option value="yes">あり</option>
          </select>
        </label>

        <fieldset>
          <legend>オプション</legend>
          <div id="optionList" class="checkbox-grid"></div>
        </fieldset>

        <div class="price-box">
          <p>料金内訳: <span id="priceDetail">-</span></p>
          <p class="total">合計: ¥<span id="totalPrice">0</span></p>
        </div>

        <p id="formError" class="error"></p>

        <div class="modal-actions">
          <button type="button" id="cancelBtn" class="secondary">キャンセル</button>
          <button type="submit" id="submitBtn">予約確定</button>
        </div>
      </form>
    </dialog>

    <script src="app.js"></script>
  </body>
</html>
